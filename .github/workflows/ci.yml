# CI — runs the six CRG Grade B test targets on every push and PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  test:
    name: CRG Grade B — 6 targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2
        with:
          workspaces: tools/string-union-gen

      - name: Install Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb  # v2.0.2
        with:
          deno-version: v2.x

      - name: Install just + shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -sSfL https://just.systems/install.sh \
            | bash -s -- --to "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: T1 — structure
        run: just test-structure

      - name: T2 — unit (cargo test)
        run: just test-unit

      - name: T3 — e2e (Rust CLI on fixture)
        run: just test-e2e

      - name: T4 — property (Deno)
        run: just test-property

      - name: T5 — bench (Deno)
        run: just test-bench

      - name: T6 — lint (clippy + fmt + shellcheck)
        run: just test-lint

      - name: Report CRG grade
        run: |
          echo "CRG Grade: $(just crg-grade)"
          just crg-badge
